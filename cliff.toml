[changelog]
header = """
# Changelog

"""
body = """
{% if version %}\
## {{ version }} - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## Unreleased
{% endif %}\

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }}
{% endfor %}
{% endfor %}\
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
commit_parsers = [
  { message = '^feat', group = '<!-- 0 -->Features' },
  { message = '^fix', group = '<!-- 1 -->Bug Fixes' },
  { message = '^perf', group = '<!-- 2 -->Performance' },
  { message = '^refactor', group = '<!-- 3 -->Refactoring' },
  { message = '^docs?', group = '<!-- 4 -->Documentation' },
  { message = '^test', group = '<!-- 5 -->Tests' },
  { message = '^build', group = '<!-- 6 -->Build' },
  { message = '^ci', group = '<!-- 7 -->Continuous Integration' },
  { message = '^chore', group = '<!-- 8 -->Chores' },
  { message = '.*', group = '<!-- 9 -->Other' },
]
filter_commits = false
tag_pattern = 'v[0-9]*.[0-9]*.[0-9]*'
sort_commits = 'oldest'
