name: Testing

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  NUGET_PACKAGES: ${{ github.workspace }}\.nuget\packages

jobs:
  build-test:
    name: Build and Test
    runs-on: windows-latest
    environment:
      name: testing

    steps:
      - name: Enable Git long paths
        run: git config --global core.longpaths true

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - name: Fetch Level 2 Submodules Only
        run: |
          git submodule foreach 'git -c protocol.version=2 submodule update --init --force --depth=1'

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ runner.os }}-${{ hashFiles('global.json', '**/packages.lock.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore .NET packages
        run: dotnet restore TreeSitter.slnx --locked-mode

      - name: Build all .NET projects
        run: dotnet build TreeSitter.slnx --configuration Release --no-restore

      - name: Test all .NET projects
        run: dotnet test TreeSitter.slnx --configuration Release --no-build --verbosity normal
